<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Powerlifting Judge</title>
  </head>
  <body>
    <div id="root"></div>

    <!--
      OpenCV.js — loaded async so it doesn't block the page.

            onload="window._opencvLoaded = true"></script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
